<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>hello-vfx-js</title>
  </head>
  <body>
    <section class="p-home-section-hero">
      <div class="p-home-section-hero__background">
        <div class="p-home-section-hero__human">
          <picture>
            <source media="(min-width:768px)" srcset="https://dummyimage.com/1200x670/8ff/fff.png?text=Human">
            <img class="p-home-section-hero__human-image" src="https://dummyimage.com/375x670/8ff/fff.png?text=Human" alt="Human">
          </picture>
        </div>
      </div>
      <div class="p-home-section-hero__foreground">
        <h1 class="p-home-section-hero__title">
          <img class="p-home-section-hero__title-image" src="https://dummyimage.com/600x400/000/fff.png?text=Title" alt="Title">
        </h1>
        <div class="p-home-section-hero__date">
          <img class="p-home-section-hero__date-image" src="https://dummyimage.com/600x100/000/fff.png?text=Date" alt="Date">
        </div>
        <div class="p-home-section-hero__badge">
          <img class="p-home-section-hero__badge-image" src="https://dummyimage.com/100x100/000/fff.png?text=Badge" alt="Badge">
        </div>
        <div class="p-home-section-hero__balloon p-home-section-hero__balloon--01">
          <img class="p-home-section-hero__balloon-image" src="https://dummyimage.com/100x100/000/fff.png?text=Balloon%2001" alt="Balloon 01">
        </div>
        <div class="p-home-section-hero__balloon p-home-section-hero__balloon--02">
          <img class="p-home-section-hero__balloon-image" src="https://dummyimage.com/100x100/000/fff.png?text=Balloon%2002" alt="Balloon 02">
        </div>
        <div class="p-home-section-hero__balloon p-home-section-hero__balloon--03">
          <img class="p-home-section-hero__balloon-image" src="https://dummyimage.com/100x100/000/fff.png?text=Balloon%2003" alt="Balloon 03">
        </div>
        <div class="p-home-section-hero__balloon p-home-section-hero__balloon--04">
          <img class="p-home-section-hero__balloon-image" src="https://dummyimage.com/100x100/000/fff.png?text=Balloon%2004" alt="Balloon 04">
        </div>
      </div>
    </section>
    <section class="p-home-section-information">
      <p class="p-home-section-information__copy">
        <a class="p-home-section-information__toggle js-vfx-toggle" href="?vfx-js=0">VFXをOFFにする</a>
      </p>
    </section>
    <script type="module" src="./index.ts"></script>
  </body>
</html>

<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>hello-vfx-js</title>
  </head>
  <body>
    <section class="p-home-section-hero">
      <div class="p-home-section-hero__background">
        <div class="p-home-section-hero__human">
          <picture>
            <source media="(min-width:768px)" srcset="./assets/img/hero-human-desktop.png">
            <img class="p-home-section-hero__human-image" src="./assets/img/hero-human-mobile.png" alt="Human">
          </picture>
        </div>
      </div>
      <div class="p-home-section-hero__foreground">
        <h1 class="p-home-section-hero__title">
          <img class="p-home-section-hero__title-image" src="./assets/img/hero-title.png" alt="Title">
        </h1>
        <div class="p-home-section-hero__date">
          <img class="p-home-section-hero__date-image" src="./assets/img/hero-date.png" alt="Date">
        </div>
        <div class="p-home-section-hero__badge">
          <img class="p-home-section-hero__badge-image" src="./assets/img/hero-badge.png" alt="Badge">
        </div>
        <div class="p-home-section-hero__balloon p-home-section-hero__balloon--01">
          <img class="p-home-section-hero__balloon-image" src="./assets/img/hero-balloon-01.png" alt="Balloon 01">
        </div>
        <div class="p-home-section-hero__balloon p-home-section-hero__balloon--02">
          <img class="p-home-section-hero__balloon-image" src="./assets/img/hero-balloon-02.png" alt="Balloon 02">
        </div>
        <div class="p-home-section-hero__balloon p-home-section-hero__balloon--03">
          <img class="p-home-section-hero__balloon-image" src="./assets/img/hero-balloon-03.png" alt="Balloon 03">
        </div>
        <div class="p-home-section-hero__balloon p-home-section-hero__balloon--04">
          <img class="p-home-section-hero__balloon-image" src="./assets/img/hero-balloon-04.png" alt="Balloon 04">
        </div>
      </div>
    </section>
    <section class="p-home-section-information">
      <p class="p-home-section-information__copy">
        <a class="p-home-section-information__toggle js-vfx-toggle" href="?vfx-js=0">vfx-jsをOFFにする</a>
      </p>
    </section>
    <script type="module" src="./index.ts"></script>
  </body>
</html>
